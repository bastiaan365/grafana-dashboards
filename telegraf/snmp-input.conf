# Telegraf Input: SNMP for OPNsense
# Polls OPNsense firewall via SNMP for interface statistics.
#
# Prerequisites:
#   - SNMP v2c or v3 enabled on OPNsense (Services > Net-SNMP)
#   - Firewall rule allowing SNMP (UDP 161) from Telegraf host
#   - Community string or SNMPv3 credentials configured below

[[inputs.snmp]]
  name = "snmp_opnsense"
  agents = ["udp://opnsense.lan:161"]

  ## SNMP version: 2 = SNMPv2c, 3 = SNMPv3
  version = 2

  ## SNMPv2c community string
  community = "${SNMP_COMMUNITY}"

  ## SNMPv3 authentication (uncomment if using v3)
  # version = 3
  # sec_name = "telegraf"
  # sec_level = "authPriv"
  # auth_protocol = "SHA"
  # auth_password = "${SNMP_AUTH_PASS}"
  # priv_protocol = "AES"
  # priv_password = "${SNMP_PRIV_PASS}"

  ## Polling interval
  interval = "30s"
  timeout = "10s"
  retries = 3

  ## -----------------------------------------------------------------------
  ## System info (sysUpTime, sysName, sysDescr)
  ## -----------------------------------------------------------------------

  [[inputs.snmp.field]]
    name = "uptime"
    oid = "RFC1213-MIB::sysUpTime.0"

  [[inputs.snmp.field]]
    name = "hostname"
    oid = "RFC1213-MIB::sysName.0"
    is_tag = true

  ## -----------------------------------------------------------------------
  ## Interface table - walks IF-MIB for all interfaces
  ## -----------------------------------------------------------------------

  [[inputs.snmp.table]]
    name = "snmp_interface"
    inherit_tags = ["hostname"]

    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = "IF-MIB::ifDescr"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "IF-MIB::ifOperStatus"

    [[inputs.snmp.table.field]]
      name = "ifSpeed"
      oid = "IF-MIB::ifSpeed"

    ## Inbound
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = "IF-MIB::ifHCInOctets"

    [[inputs.snmp.table.field]]
      name = "ifInUcastPkts"
      oid = "IF-MIB::ifInUcastPkts"

    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = "IF-MIB::ifInErrors"

    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid = "IF-MIB::ifInDiscards"

    ## Outbound
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = "IF-MIB::ifHCOutOctets"

    [[inputs.snmp.table.field]]
      name = "ifOutUcastPkts"
      oid = "IF-MIB::ifOutUcastPkts"

    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = "IF-MIB::ifOutErrors"

    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid = "IF-MIB::ifOutDiscards"

  ## -----------------------------------------------------------------------
  ## PF (Packet Filter) state table - FreeBSD/OPNsense specific
  ## -----------------------------------------------------------------------

  [[inputs.snmp.field]]
    name = "pf_state_count"
    oid = "BEGEMOT-PF-MIB::pfStateTableCount.0"

  [[inputs.snmp.field]]
    name = "pf_state_searches"
    oid = "BEGEMOT-PF-MIB::pfStateTableSearches.0"

  [[inputs.snmp.field]]
    name = "pf_state_inserts"
    oid = "BEGEMOT-PF-MIB::pfStateTableInserts.0"

  [[inputs.snmp.field]]
    name = "pf_state_removals"
    oid = "BEGEMOT-PF-MIB::pfStateTableRemovals.0"
