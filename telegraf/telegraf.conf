# Telegraf Configuration
# Main configuration for homelab TIG stack
# Platform: Raspberry Pi 5 (8GB)

[global_tags]
  environment = "homelab"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "homelab"
  bucket = "telegraf"
  timeout = "5s"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# CPU usage
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false

# Memory usage
[[inputs.mem]]

# Disk usage (mount points)
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Disk I/O
[[inputs.diskio]]

# Network interface stats
[[inputs.net]]
  ignore_protocol_stats = true

# System load and uptime
[[inputs.system]]

# Process stats
[[inputs.processes]]

# Temperature sensors (Raspberry Pi thermal zone)
[[inputs.temp]]

# Syslog input - receive logs from OPNsense and other devices
[[inputs.syslog]]
  server = "udp://:6514"

  ## TLS configuration (optional, uncomment for TCP+TLS)
  # server = "tcp://:6514"
  # tls_cert = "/etc/telegraf/tls/server.crt"
  # tls_key = "/etc/telegraf/tls/server.key"
  # tls_allowed_cacerts = ["/etc/telegraf/tls/ca.crt"]

  ## Best effort parsing for syslog messages
  best_effort = true
  syslog_standard = "RFC5424"
