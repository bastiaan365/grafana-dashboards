# Telegraf Input: Suricata EVE JSON Log
# Parses Suricata's EVE JSON log output for IDS alert metrics.
#
# Prerequisites:
#   - Suricata configured with EVE JSON logging enabled
#   - eve.json output path matching the file path below
#   - Telegraf user must have read access to the log file

[[inputs.tail]]
  name_override = "suricata"
  files = ["/var/log/suricata/eve.json"]
  from_beginning = false
  pipe = false
  watch_method = "inotify"

  ## Data format: JSON
  data_format = "json"

  ## Parse the timestamp from the Suricata log
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05.999999-0700"

  ## Only include alert events
  json_query = "event_type"

  ## Fields to extract as tags (for grouping/filtering in queries)
  tag_keys = [
    "event_type",
    "src_ip",
    "dest_ip",
    "proto",
    "alert_signature",
    "alert_severity",
    "alert_category",
    "alert_action"
  ]

  ## Rename tags to cleaner names using fieldpass/tagexclude if needed
  ## The JSON structure of a Suricata alert looks like:
  ## {
  ##   "timestamp": "...",
  ##   "event_type": "alert",
  ##   "src_ip": "192.168.1.100",
  ##   "dest_ip": "10.0.0.1",
  ##   "src_port": 54321,
  ##   "dest_port": 443,
  ##   "proto": "TCP",
  ##   "alert": {
  ##     "action": "allowed",
  ##     "gid": 1,
  ##     "signature_id": 2024897,
  ##     "rev": 3,
  ##     "signature": "ET MALWARE ...",
  ##     "category": "A Network Trojan was detected",
  ##     "severity": 1
  ##   }
  ## }

  ## Flatten nested JSON fields with an underscore separator
  json_string_fields = [
    "alert_signature",
    "alert_category",
    "alert_action"
  ]

  ## Fields to include as metrics
  fieldpass = [
    "alert_signature_id",
    "alert_severity",
    "alert_gid",
    "alert_rev",
    "src_port",
    "dest_port",
    "flow_bytes_toserver",
    "flow_bytes_toclient",
    "flow_pkts_toserver",
    "flow_pkts_toclient"
  ]
